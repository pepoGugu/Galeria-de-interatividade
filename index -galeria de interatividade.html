<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #64748b;
      --line: #d9e2ec;
      --blue: #009dff;
      --blue-dark: #0878c2;
      --green: #0f766e;
      --red: #c2410c;
      --body-glow: #eaf6ff;
      --body-glow-end: rgba(234, 246, 255, 0);
      --brand-ink: #102033;
      --panel-border: rgba(217, 226, 236, 0.9);
      --soft-button-text: #0f3554;
      --soft-button-bg: #dff2ff;
      --field-label: #314155;
      --field-border: #cbd5e1;
      --field-bg: #ffffff;
      --field-text: #0f172a;
      --editor-item-bg: #fbfdff;
      --editor-bar-bg: #eef6fc;
      --editor-bar-text: #18324a;
      --output-bg: #f8fbff;
      --output-text: #17324d;
      --preview-border: #b7c8d9;
      --preview-bg: #f8fafc;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    html[data-page="conteudo"] {
      --bg: #f3eef8;
      --body-glow: #f3eef8;
      --body-glow-end: rgba(243, 238, 248, 0);
      --brand-ink: #3a3148;
      --blue: #7c3aed;
      --blue-dark: #6d28d9;
      --green: #f97316;
      --soft-button-text: #3f3456;
      --soft-button-bg: #ebe5f2;
      --editor-bar-bg: #eee8f5;
      --editor-bar-text: #3a3148;
      --preview-border: #c9bfd8;
      --shadow: 0 16px 40px rgba(58, 49, 72, 0.1);
    }

    html[data-theme="dark"] {
      --bg: #172a34;
      --panel: #101827;
      --ink: #e5edf7;
      --muted: #9aa8bb;
      --line: #273548;
      --blue: #00a8e8;
      --blue-dark: #38c6ff;
      --green: #16a394;
      --red: #fb923c;
      --brand-ink: #f8fafc;
      --panel-border: rgba(39, 53, 72, 0.95);
      --field-label: #d8e6f3;
      --field-border: #33465e;
      --field-bg: #0b1422;
      --field-text: #e5edf7;
      --editor-item-bg: #0d1727;
      --editor-bar-bg: #122138;
      --editor-bar-text: #d8e6f3;
      --output-bg: #0b1422;
      --output-text: #e5edf7;
      --preview-border: #36556f;
      --preview-bg: #0b1422;
      --shadow: 0 20px 46px rgba(0, 0, 0, 0.35);
      color-scheme: dark;
    }

    html[data-theme="dark"][data-page="conteudo"] {
      --bg: #282634;
      --panel: #171520;
      --line: #373243;
      --blue: #8b5cf6;
      --blue-dark: #a78bfa;
      --green: #fb923c;
      --panel-border: rgba(68, 61, 82, 0.95);
      --field-border: #454052;
      --field-bg: #11101a;
      --editor-item-bg: #15131e;
      --editor-bar-bg: #211d2c;
      --preview-border: #61576f;
      --preview-bg: #11101a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      background:
        linear-gradient(180deg, var(--body-glow) 0, var(--body-glow-end) 320px),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html[data-page="conteudo"] body {
      background: var(--bg);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app {
      width: min(1320px, calc(100% - 32px));
      height: 100vh;
      margin: 0 auto;
      padding: 28px 0 20px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 0 0 auto;
      gap: 16px;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand h1 {
      margin: 0;
      color: var(--brand-ink);
      font-size: 28px;
      line-height: 1.12;
      font-weight: 800;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .page-nav {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.52);
    }

    .page-nav__link {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .page-nav__link:hover,
    .page-nav__link[aria-current="page"] {
      color: #ffffff;
      background: var(--blue);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 10px 14px;
      border-radius: 8px;
      color: #ffffff;
      background: var(--blue);
      font-weight: 750;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
      white-space: nowrap;
    }

    .button:hover {
      background: var(--blue-dark);
      box-shadow: 0 10px 22px rgba(0, 157, 255, 0.2);
      transform: translateY(-1px);
    }

    .button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .button:focus-visible {
      outline: 3px solid rgba(0, 157, 255, 0.25);
      outline-offset: 2px;
    }

    .button--soft {
      color: var(--soft-button-text);
      background: var(--soft-button-bg);
    }

    .button--soft:hover {
      color: #ffffff;
      background: var(--blue-dark);
    }

    .button--green {
      background: var(--green);
    }

    .button--green:hover {
      background: #0b5f59;
      box-shadow: 0 10px 22px rgba(15, 118, 110, 0.18);
    }

    .button--danger {
      color: #ffffff;
      background: #dc2626;
      box-shadow: none;
    }

    .button--danger:hover {
      color: #ffffff;
      background: #b91c1c;
      box-shadow: none;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.55);
      cursor: pointer;
      user-select: none;
    }

    .theme-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .theme-toggle__track {
      width: 42px;
      height: 24px;
      padding: 3px;
      border-radius: 999px;
      background: #cfe2f3;
      transition: background 0.16s ease;
    }

    .theme-toggle__thumb {
      display: block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.25);
      transition: transform 0.16s ease;
    }

    .theme-toggle input:checked + .theme-toggle__track {
      background: var(--blue);
    }

    .theme-toggle input:checked + .theme-toggle__track .theme-toggle__thumb {
      transform: translateX(18px);
    }

    .theme-toggle__text {
      font-size: 13px;
      font-weight: 750;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(350px, 0.78fr) minmax(520px, 1.22fr);
      gap: 18px;
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }

    .panel {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 0 0 auto;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel__head h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.3;
    }

    .panel__body {
      min-height: 0;
      padding: 18px;
    }

    .editor-panel .panel__body {
      display: flex;
      flex: 1;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    .editor-tools {
      flex: 0 0 auto;
      padding: 18px 18px 0;
    }

    .editor-tools.is-hidden,
    .button.is-hidden {
      display: none;
    }

    .editor-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
      padding: 4px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
    }

    .editor-tabs__button {
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .editor-tabs__button:hover,
    .editor-tabs__button[aria-selected="true"] {
      color: #ffffff;
      background: var(--blue);
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    .field span {
      color: var(--field-label);
      font-size: 13px;
      font-weight: 750;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--field-border);
      border-radius: 8px;
      color: var(--field-text);
      background: var(--field-bg);
      padding: 11px 12px;
      outline: none;
      transition: border 0.12s ease, box-shadow 0.12s ease;
    }

    .field select {
      min-height: 42px;
      cursor: pointer;
    }

    .field input[type="color"] {
      min-height: 40px;
      padding: 5px;
      cursor: pointer;
    }

    .field textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.5;
    }

    .field textarea.bulk-input {
      min-height: 150px;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0, 157, 255, 0.15);
    }

    .faq-editor {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 12px;
      height: 100%;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: scroll;
      overscroll-behavior: contain;
      padding: 18px 12px 18px 18px;
      scrollbar-gutter: stable;
    }

    .editor-section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 2px 0 0;
      padding: 2px 2px 0;
    }

    .table-editor__title {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
    }

    .editor-section-title h3 {
      margin: 0;
      color: var(--brand-ink);
      font-size: 14px;
      line-height: 1.3;
    }

    .editor-section-title p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .bulk-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin: -4px 0 16px;
    }

    .bulk-status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .faq-editor__item {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--editor-item-bg);
      overflow: hidden;
    }

    .faq-editor__bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      background: var(--editor-bar-bg);
      border-bottom: 1px solid var(--line);
    }

    .faq-editor__bar strong {
      min-width: 0;
      color: var(--editor-bar-text);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .faq-editor__fields {
      padding: 12px;
    }

    .faq-bulk-panel {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--editor-item-bg);
      overflow: hidden;
    }

    .faq-bulk-panel__body {
      padding: 12px;
    }

    .faq-bulk-panel .field {
      margin-bottom: 10px;
    }

    .faq-bulk-panel .bulk-input {
      min-height: 150px;
    }

    .table-editor {
      display: grid;
      gap: 12px;
      margin-top: 8px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .table-editor__box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--editor-item-bg);
      overflow: hidden;
    }

    .table-editor__box--sheet {
      background: transparent;
    }

    .table-editor__box-body {
      padding: 12px;
    }

    .table-editor__columns,
    .table-row-editor__cells {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .table-settings {
      display: grid;
      gap: 12px;
    }

    .table-settings__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      background: var(--editor-bar-bg);
      border-bottom: 1px solid var(--line);
    }

    .table-settings__head strong {
      color: var(--editor-bar-text);
      font-size: 13px;
    }

    .table-settings__controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .table-settings__body {
      display: grid;
      gap: 12px;
      padding: 12px;
    }

    .sheet-field {
      margin-bottom: 10px;
    }

    .sheet-field span {
      color: var(--muted);
      font-size: 12px;
      opacity: 0.72;
    }

    .field textarea.sheet-paste {
      min-height: 116px;
      padding: 8px 10px;
      color: var(--field-text);
      background:
        linear-gradient(rgba(148, 163, 184, 0.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.18) 1px, transparent 1px),
        var(--field-bg);
      background-size: 100% 24px, 18ch 100%, auto;
      font: 12px/1.5 Consolas, "Courier New", monospace;
      tab-size: 16;
    }

    .field textarea.sheet-paste::placeholder {
      color: var(--field-text);
      opacity: 0.38;
    }

    .table-header-color {
      width: 32px;
      height: 32px;
      min-height: 32px;
      padding: 3px;
      border: 1px solid var(--field-border);
      border-radius: 8px;
      background: var(--field-bg);
      cursor: pointer;
    }

    .table-header-color::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .table-header-color::-webkit-color-swatch {
      border: 0;
      border-radius: 5px;
    }

    .table-editor__column {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: end;
    }

    .table-editor__column .field {
      margin-bottom: 0;
    }

    .table-row-editor__cells .field {
      margin-bottom: 0;
    }

    .stories-editor {
      display: grid;
      gap: 12px;
      margin-top: 8px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .stories-editor__box,
    .stories-slide-editor {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--editor-item-bg);
      overflow: hidden;
    }

    .stories-container-editor summary {
      list-style: none;
      cursor: pointer;
    }

    .stories-container-editor summary::-webkit-details-marker {
      display: none;
    }

    .stories-container-editor__summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--editor-bar-bg);
      border-bottom: 1px solid var(--line);
    }

    .stories-container-editor:not([open]) .stories-container-editor__summary {
      border-bottom: 0;
    }

    .stories-container-editor__summary strong {
      flex: 1;
      min-width: 0;
      color: var(--editor-bar-text);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .stories-container-editor__meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .stories-container-editor__chevron {
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      transition: transform 0.14s ease;
    }

    .stories-container-editor__actions,
    .stories-editor__title-actions,
    .stories-slide-editor__actions {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      gap: 6px;
    }

    .stories-container-editor[open] .stories-container-editor__chevron {
      transform: rotate(90deg);
    }

    .stories-editor__body {
      display: grid;
      gap: 12px;
      padding: 12px;
    }

    .stories-guide {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--editor-item-bg);
      overflow: hidden;
    }

    .stories-guide summary {
      list-style: none;
      cursor: pointer;
    }

    .stories-guide summary::-webkit-details-marker {
      display: none;
    }

    .stories-guide__summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--editor-bar-bg);
      border-bottom: 1px solid var(--line);
    }

    .stories-guide:not([open]) .stories-guide__summary {
      border-bottom: 0;
    }

    .stories-guide__summary strong {
      flex: 1;
      min-width: 0;
      color: var(--editor-bar-text);
      font-size: 13px;
    }

    .stories-guide__summary span {
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      transition: transform 0.14s ease;
    }

    .stories-guide[open] .stories-guide__summary span {
      transform: rotate(90deg);
    }

    .stories-guide__body {
      display: grid;
      gap: 8px;
      padding: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .stories-guide__body p {
      margin: 0;
    }

    .stories-guide__body strong {
      color: var(--field-label);
      font-weight: 800;
    }

    .stories-limits {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .stories-editor__grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }

    .stories-editor__grid--base {
      grid-template-columns: minmax(0, 1fr);
    }

    .stories-slide-editor__body {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .stories-slide-editor__body .field {
      margin-bottom: 0;
    }

    .table-row-editor {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--editor-item-bg);
      overflow: hidden;
    }

    .table-row-editor__cells {
      padding: 12px;
    }

    .icon-button {
      width: 32px;
      height: 32px;
      min-height: 32px;
      padding: 0;
      border-radius: 8px;
    }

    .icon-button svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
    }

    .status {
      min-height: 20px;
      color: var(--green);
      font-size: 13px;
      font-weight: 750;
      text-align: right;
    }

    .output {
      display: grid;
      flex: 1;
      grid-template-rows: auto 170px minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
      overflow: hidden;
    }

    .output textarea {
      width: 100%;
      height: 100%;
      min-height: 0;
      padding: 14px;
      border: 1px solid var(--field-border);
      border-radius: 8px;
      resize: none;
      color: var(--output-text);
      background: var(--output-bg);

    const storiesStyle = `<style>
  /* Guia rapido de midias:
     - Slide/story: proporcao 9:16. Recomendado 1080x1920 px. Minimo seguro 860x1530 px.

     - Limites do componente: ate 3 containers e ate 4 slides por container.

    function escapeHtml(value) {

      const shortHexMatch = colorValue.match(/^#([0-9a-fA-F]{3})$/);

      if (shortHexMatch) {
        return `#${shortHexMatch[1].split("").map((char) => char + char).join("")}`.toLowerCase();
      }

      if (/^#[0-9a-fA-F]{6}$/.test(colorValue)) {
        return colorValue.toLowerCase();
      }

      return "#ea5b0c";

        editor.innerHTML = renderStoriesEditor();
      } else {
        editor.innerHTML = renderFaqEditor();
      }
      editor.scrollTop = 0;

      updateOutput();
    }

    function parseBulkFaq(value) {
      const normalized = value.replace(/\r\n?/g, "\n");
      const questionPattern = /(?:^|\n)\s*(?:\d+|[A-Za-z])\.\s*([\s\S]*?\?)/g;
      const matches = [];
      const items = [];
      let match;

      while ((match = questionPattern.exec(normalized)) !== null) {
        matches.push({
          start: match.index,
          end: match.index + match[0].length,
          question: match[1].replace(/\s+/g, " ").trim()
        });
      }

      matches.forEach((item, index) => {
        const nextItem = matches[index + 1];
        const answerEnd = nextItem ? nextItem.start : normalized.length;
        const answer = normalized.slice(item.end, answerEnd).trim();

        if (item.question || answer) {
          items.push({ question: item.question, answer });
        }
      });

      return items;
    }

    function fillFromBulk() {
      const parsedItems = parseBulkFaq(state.faqBulkInput);

      if (!parsedItems.length) {
        state.faqBulkStatus = "Não encontrei perguntas no formato 1. Pergunta?";
        renderEditor();
        return;
      }

      state.items = parsedItems;
      state.faqBulkStatus = `${parsedItems.length} pergunta${parsedItems.length === 1 ? "" : "s"} preenchida${parsedItems.length === 1 ? "" : "s"}.`;
      renderEditor();
    }

    function createEmptyTableRow() {
      return getTableColumns().map(() => "");
    }

    function normalizeTableRows() {
      const columns = getTableColumns();
      state.table.rows = state.table.rows.map((row) => columns.map((column, index) => row[index] || ""));

      if (!state.table.rows.length) {
        state.table.rows.push(createEmptyTableRow());
      }
    }

    function parseBulkTableHtml(value) {
      const html = value.includes("<table") ? value : `<table>${value}</table>`;
      const documentValue = new DOMParser().parseFromString(html, "text/html");
      const headerCells = Array.from(documentValue.querySelectorAll("thead th"));
      const columns = headerCells.map((cell) => cell.textContent.replace(/\s+/g, " ").trim()).filter(Boolean);
      let rowElements = Array.from(documentValue.querySelectorAll("tbody tr"));

      if (!rowElements.length) {
        rowElements = Array.from(documentValue.querySelectorAll("tr")).filter((row) => row.querySelector("td"));
      }

      const rows = rowElements
        .map((row) => Array.from(row.querySelectorAll("td")).map((cell) => cell.textContent.replace(/\s+/g, " ").trim()))
        .filter((row) => row.some(Boolean));

      return { columns, rows };
    }

    function parseBulkTableText(value) {
      const lines = value
        .replace(/\r\n?/g, "\n")
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean);

      const rows = lines.map((line) => {
        if (line.includes("\t")) {
          return line.split("\t").map((cell) => cell.trim());
        }

        if (line.includes(";")) {
          return line.split(";").map((cell) => cell.trim());
        }

        const skuAndTitle = line.match(/^(\S+)\s+(.+)$/);
        return skuAndTitle ? [skuAndTitle[1], skuAndTitle[2]] : [line];
      }).filter((row) => row.some(Boolean));

      const firstRow = rows[0] || [];
      const firstRowLooksLikeHeader = rows.length > 1 && firstRow.some((cell) => /sku|t[ií]tulo|produto|descri[cç][aã]o/i.test(cell));

      return {
        columns: firstRowLooksLikeHeader ? firstRow : [],
        rows: firstRowLooksLikeHeader ? rows.slice(1) : rows
      };
    }

    function parseBulkTable(value) {
      const trimmed = value.trim();

      if (!trimmed) {
        return { columns: [], rows: [] };
      }

      if (/<\/?(table|thead|tbody|tr|td|th)\b/i.test(trimmed)) {
        return parseBulkTableHtml(trimmed);
      }

      return parseBulkTableText(trimmed);
    }

    function fillTableFromBulk() {
      const parsedTable = parseBulkTable(state.table.bulkInput);

      if (!parsedTable.rows.length) {
        state.table.status = "Não encontrei linhas para preencher.";
        renderEditor();
        return;
      }

      const maxColumns = Math.max(
        parsedTable.columns.length,
        state.table.columns.length,
        ...parsedTable.rows.map((row) => row.length)
      );

      state.table.columns = Array.from({ length: maxColumns }, (item, index) => {
        return parsedTable.columns[index] || state.table.columns[index] || `COLUNA ${index + 1}`;
      });
      state.table.headerColors = Array.from({ length: maxColumns }, (item, index) => {
        return normalizeHexColor(state.table.headerColors[index] || state.table.headerColor);
      });

      state.table.rows = parsedTable.rows.map((row) => {
        return Array.from({ length: maxColumns }, (item, index) => row[index] || "");
      });

      state.table.status = `${state.table.rows.length} linha${state.table.rows.length === 1 ? "" : "s"} preenchida${state.table.rows.length === 1 ? "" : "s"}.`;
      renderEditor();
    }

    function addTableColumn() {
      state.table.columns.push("");
      state.table.headerColors.push(normalizeHexColor(state.table.headerColor));
      state.table.rows.forEach((row) => row.push(""));
      state.table.status = "";
      renderEditor();
    }

    function removeTableColumn(index) {
      if (state.table.columns.length <= 1) {
        return;
      }

      state.table.columns.splice(index, 1);
      state.table.headerColors.splice(index, 1);
      state.table.rows.forEach((row) => row.splice(index, 1));
      state.table.status = "";
      normalizeTableRows();
      normalizeTableHeaderColors();
      renderEditor();
    }

    function addTableRow() {
      state.table.rows.push(createEmptyTableRow());
      state.table.status = "";
      renderEditor();
      const lastRowInput = editor.querySelector(`[data-table-row="${state.table.rows.length - 1}"] input`);
      if (lastRowInput) {
        lastRowInput.focus();
      }
    }

    function removeTableRow(index) {
      state.table.rows.splice(index, 1);
      state.table.status = "";
      normalizeTableRows();
      renderEditor();
    }

    function addItem() {
      state.items.push({ question: "", answer: "" });
      renderEditor();
      const lastItem = editor.querySelector(`.faq-editor__item[data-index="${state.items.length - 1}"] input`);
      if (lastItem) {
        lastItem.focus();
      }
    }

    function addCurrentItem() {
      if (currentPage === "conteudo" && currentEditorTab === "table") {
        addTableRow();
        return;
      }

      if (currentPage === "conteudo" && currentEditorTab === "stories") {
        return;
      }

      addItem();
    }

    async function copyGeneratedHtml(mode = "html") {
      const copyMode = mode === "full" ? "full" : "html";
      const value = buildOutputHtml(copyMode);
      generatedHtml.value = value;
      generatedHtml.focus();
      generatedHtml.select();

      try {
        await navigator.clipboard.writeText(value);
      } catch (error) {
        document.execCommand("copy");
      }

      copyStatus.textContent = copyMode === "full" && currentPage === "conteudo"
        ? pageConfigs[currentPage].fullCopiedStatus
        : pageConfigs[currentPage].copiedStatus;
      window.setTimeout(() => {
        copyStatus.textContent = "";
      }, 2400);
    }

    editor.addEventListener("input", (event) => {
      const faqBulkField = event.target.dataset.faqBulk;
      if (faqBulkField) {
        state.faqBulkInput = event.target.value;
        state.faqBulkStatus = "";
        return;
      }

      const storiesField = event.target.dataset.storiesField;
      if (storiesField) {
        if (storiesField === "ariaLabel") {
          state.stories.ariaLabel = event.target.value;
          updateOutput();
          return;
        }

        if (storiesField === "avatar") {
          state.stories.avatar = event.target.value;
          updateOutput();
          return;
        }

        const groupIndex = Number(event.target.dataset.storyGroup);
        const slideIndex = Number(event.target.dataset.storySlide);
        const group = state.stories.groups[groupIndex];

        if (!group) {
          return;
        }

        if (storiesField === "groupName") {
          group.name = event.target.value;
          updateOutput();
          return;
        }

        if (storiesField === "groupThumb") {
          group.thumb = event.target.value;
          updateOutput();
          return;
        }

        const slide = group.slides[slideIndex];
        if (!slide) {
          return;
        }

        if (storiesField === "type") {
          slide.type = normalizeStoryType(event.target.value);
          renderEditor();
          return;
        }

        if (storiesField === "captionPosition") {
          slide.captionPosition = normalizeStoryPosition(event.target.value);
          updateOutput();
          return;
        }

        slide[storiesField] = event.target.value;
        updateOutput();
        return;
      }

      const tableField = event.target.dataset.tableField;
      if (tableField) {
        if (tableField === "caption") {
          state.table.caption = event.target.value;
          updateOutput();
        }

        if (tableField === "headerColor") {
          state.table.headerColor = event.target.value;
          if (event.target.type === "color") {
            renderEditor();
            return;
          }
          updateOutput();
        }

        if (tableField === "columnHeaderColor") {
          const columnIndex = Number(event.target.dataset.columnIndex);
          state.table.headerColors[columnIndex] = event.target.value;
          renderEditor();
          return;
        }

        if (tableField === "bulk") {
          state.table.bulkInput = event.target.value;
          state.table.status = "";
        }

        if (tableField === "column") {
          const columnIndex = Number(event.target.dataset.columnIndex);
          state.table.columns[columnIndex] = event.target.value;
          updateOutput();
        }

        if (tableField === "cell") {
          const rowIndex = Number(event.target.dataset.rowIndex);
          const cellIndex = Number(event.target.dataset.cellIndex);
          state.table.rows[rowIndex][cellIndex] = event.target.value;
          updateOutput();
        }

        return;
      }

      const field = event.target.dataset.field;
      if (!field) {
        return;
      }

      const itemElement = event.target.closest(".faq-editor__item");
      const index = Number(itemElement.dataset.index);
      state.items[index][field] = event.target.value;
      updateOutput();
    });

    editor.addEventListener("change", (event) => {
      if (event.target.matches("select")) {
        event.target.dispatchEvent(new Event("input", { bubbles: true }));
      }
    });

    editor.addEventListener("toggle", (event) => {
      const container = event.target.closest("[data-story-container]");
      if (!container || event.target !== container) {
        return;
      }

      const groupIndex = Number(container.dataset.storyContainer);
      if (!container.open) {
        if (state.stories.openGroupIndex === groupIndex) {
          state.stories.openGroupIndex = -1;
        }
        return;
      }

      state.stories.openGroupIndex = groupIndex;
      editor.querySelectorAll("[data-story-container]").forEach((item) => {
        if (item !== container) {
          item.open = false;
        }
      });
    }, true);

    editor.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) {
        return;
      }

      const action = button.dataset.action;
      if (action.includes("story")) {
        event.preventDefault();
        event.stopPropagation();
      }

      if (action === "remove") {
        const itemElement = button.closest(".faq-editor__item");
        const index = Number(itemElement.dataset.index);
        state.items.splice(index, 1);

        if (state.items.length === 0) {
          state.items.push({ question: "", answer: "" });
        }

        renderEditor();
        return;
      }

      if (action === "fill-faq-bulk") {
        fillFromBulk();
      }

      if (action === "add-table-column") {
        addTableColumn();
      }

      if (action === "remove-table-column") {
        removeTableColumn(Number(button.dataset.columnIndex));
      }

      if (action === "add-table-row") {
        addTableRow();
      }

      if (action === "remove-table-row") {
        const rowElement = button.closest("[data-table-row]");
        removeTableRow(Number(rowElement.dataset.tableRow));
      }

      if (action === "fill-table-bulk") {
        fillTableFromBulk();
      }

      if (action === "add-story-container") {
        addStoryContainer();
      }

      if (action === "remove-story-container") {
        removeStoryContainer(Number(button.dataset.storyGroup));
      }

      if (action === "add-story-slide") {
        addStorySlide(Number(button.dataset.storyGroup));
      }

      if (action === "remove-story-slide") {
        removeStorySlide(Number(button.dataset.storyGroup), Number(button.dataset.storySlide));
      }
    });

    editorTabButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const requestedTab = button.dataset.editorTab;
        currentEditorTab = ["faq", "table", "stories"].includes(requestedTab) ? requestedTab : "faq";
        renderEditor();
      });
    });

    document.querySelector("#addItem").addEventListener("click", addCurrentItem);
    document.querySelector("#addItemTop").addEventListener("click", addCurrentItem);
    [...htmlCopyButtons, ...fullCopyButtons].forEach((button) => {
      button.addEventListener("click", () => {
        copyGeneratedHtml(button.dataset.copyMode);
      });
    });
    window.addEventListener("hashchange", () => {
      applyPage(getPageFromHash());
    });
    themeToggle.addEventListener("change", () => {
      setTheme(themeToggle.checked ? "dark" : "light");
    });

    setTheme(getInitialTheme());
    applyPage(getPageFromHash());
  </script>
</body>
</html>
